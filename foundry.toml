[profile.default]
src = "packages/contracts/src"
test = "packages/contracts/test"
script = "packages/contracts/script"
out = "packages/contracts/out"
cache_path = "packages/contracts/cache"
libs = ["packages/contracts/lib", "packages/contracts/node_modules", "node_modules"]
solc_version = "0.8.25"
optimizer = true
optimizer_runs = 200
remappings = [
  "@openzeppelin/contracts/=packages/contracts/node_modules/@openzeppelin/contracts/",
  "forge-std/=packages/contracts/lib/forge-std/src/"
]

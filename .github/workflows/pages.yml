name: Deploy Website to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/pages.yml"
      - "apps/site/**"
      - "docs/WEBSITE_AND_PAGES.md"
      - "README.md"
      - "README.zh-CN.md"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static website
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build site
        env:
          CUSTOM_DOMAIN: ${{ vars.REDEEMLOOP_SITE_CUSTOM_DOMAIN }}
        run: |
          if [ -n "$CUSTOM_DOMAIN" ]; then
            export REDEEMLOOP_SITE_BASE_PATH=""
          else
            export REDEEMLOOP_SITE_BASE_PATH="/redeemloop-protocol"
          fi
          pnpm --filter @redeemloop/site build

      - name: Prepare Pages artifact
        env:
          CUSTOM_DOMAIN: ${{ vars.REDEEMLOOP_SITE_CUSTOM_DOMAIN }}
        run: |
          touch apps/site/out/.nojekyll
          if [ -n "$CUSTOM_DOMAIN" ]; then
            printf "%s\n" "$CUSTOM_DOMAIN" > apps/site/out/CNAME
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/site/out

  deploy:
    name: Deploy static website
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

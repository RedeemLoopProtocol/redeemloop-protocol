name: Beta Release Preflight Evidence

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Release identifier for the generated evidence manifest."
        required: true
        default: "v0.10.x-beta"
        type: string
      compose_smoke_run_id:
        description: "Optional workflow run ID containing redeemloop-compose-smoke-evidence."
        required: false
        type: string
      production_readiness_run_id:
        description: "Optional workflow run ID containing redeemloop-production-readiness-evidence."
        required: false
        type: string
      evm_certification_run_id:
        description: "Optional workflow run ID containing redeemloop-evm-wallet-certification-evidence."
        required: false
        type: string
      woocommerce_certification_run_id:
        description: "Optional workflow run ID containing redeemloop-woocommerce-certification-evidence."
        required: false
        type: string

permissions:
  contents: read
  actions: read

jobs:
  release-preflight:
    name: Generate beta release preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      REDEEMLOOP_EVM_RPC_URLS: ${{ secrets.REDEEMLOOP_EVM_RPC_URLS }}
      REDEEMLOOP_COMMERCE_CERTIFICATION_API_KEY: ${{ secrets.REDEEMLOOP_COMMERCE_CERTIFICATION_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize evidence manifest
        run: |
          pnpm --silent beta:evidence:init -- --dir evidence --release "${{ inputs.release }}" --force

      - name: Download selected evidence artifacts
        env:
          COMPOSE_SMOKE_RUN_ID: ${{ inputs.compose_smoke_run_id }}
          PRODUCTION_READINESS_RUN_ID: ${{ inputs.production_readiness_run_id }}
          EVM_CERTIFICATION_RUN_ID: ${{ inputs.evm_certification_run_id }}
          WOOCOMMERCE_CERTIFICATION_RUN_ID: ${{ inputs.woocommerce_certification_run_id }}
        run: |
          args=(--dir evidence --repo "${{ github.repository }}")
          if [ -n "$COMPOSE_SMOKE_RUN_ID" ]; then
            args+=(--compose-run-id "$COMPOSE_SMOKE_RUN_ID")
          fi
          if [ -n "$PRODUCTION_READINESS_RUN_ID" ]; then
            args+=(--production-run-id "$PRODUCTION_READINESS_RUN_ID")
          fi
          if [ -n "$EVM_CERTIFICATION_RUN_ID" ]; then
            args+=(--evm-run-id "$EVM_CERTIFICATION_RUN_ID")
          fi
          if [ -n "$WOOCOMMERCE_CERTIFICATION_RUN_ID" ]; then
            args+=(--woocommerce-run-id "$WOOCOMMERCE_CERTIFICATION_RUN_ID")
          fi

          if [ "${#args[@]}" -gt 4 ]; then
            if ! pnpm --silent beta:evidence:download -- "${args[@]}"; then
              echo "::warning::One or more selected evidence artifacts could not be downloaded; continuing with available placeholders."
            fi
          else
            echo "No evidence workflow run IDs were provided; keeping scaffold placeholders."
          fi

      - name: Run beta release preflight
        run: |
          set +e
          pnpm --silent beta:release:preflight -- \
            --manifest evidence/beta-evidence.manifest.json \
            --secret-env REDEEMLOOP_EVM_RPC_URLS=REDEEMLOOP_EVM_RPC_URLS \
            --secret-env REDEEMLOOP_COMMERCE_CERTIFICATION_API_KEY=REDEEMLOOP_COMMERCE_CERTIFICATION_API_KEY \
            --json > evidence/beta-release-preflight.json
          status=$?
          node -e "JSON.parse(require('node:fs').readFileSync('evidence/beta-release-preflight.json', 'utf8'));"
          cat evidence/beta-release-preflight.json
          exit "$status"

      - name: Upload beta release preflight
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redeemloop-beta-release-preflight
          path: evidence/beta-release-preflight.json
          if-no-files-found: error

name: Beta Compose Smoke Evidence

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compose-smoke:
    name: Generate Docker Compose smoke evidence
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install forge-std
        working-directory: packages/contracts
        run: forge install foundry-rs/forge-std --no-git

      - name: Build workspace
        run: pnpm build

      - name: Run Docker Compose smoke
        run: |
          mkdir -p evidence
          pnpm --silent beta:smoke:compose -- --json > evidence/compose-smoke.json
          node -e "JSON.parse(require('node:fs').readFileSync('evidence/compose-smoke.json', 'utf8'));"

      - name: Upload compose smoke evidence
        uses: actions/upload-artifact@v4
        with:
          name: redeemloop-compose-smoke-evidence
          path: evidence/compose-smoke.json
          if-no-files-found: error
